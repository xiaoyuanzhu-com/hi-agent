<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <!-- hi-agent DMG window background — "soft modern" style.
       Window content is 660x400. Finder draws the app icon and the Applications
       symlink ON TOP of this art at fixed centers (175,205) and (485,205), with
       their labels below — so those zones are intentionally left clear. -->
  <defs>
    <radialGradient id="coral" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(70 -10) scale(560)">
      <stop offset="0" stop-color="#fd605e" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#fd605e" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#fd605e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(600 410) scale(560)">
      <stop offset="0" stop-color="#13a7f5" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#13a7f5" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#13a7f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lume" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(330 175) scale(300 220)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <linearGradient id="arrowgrad" x1="258" y1="205" x2="402" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fd605e"/>
      <stop offset="1" stop-color="#13a7f5"/>
    </linearGradient>
    <marker id="tip" markerWidth="10" markerHeight="10" refX="3.4" refY="3" orient="auto">
      <path d="M0.6,0.6 L5.6,3 L0.6,5.4" fill="none" stroke="#13a7f5"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- base + luminous washes -->
  <rect width="660" height="400" fill="#fbfcfe"/>
  <ellipse cx="120" cy="60"  rx="150" ry="150" fill="#fd605e" opacity="0.10" filter="url(#soft)"/>
  <ellipse cx="560" cy="350" rx="160" ry="160" fill="#13a7f5" opacity="0.10" filter="url(#soft)"/>
  <rect width="660" height="400" fill="url(#coral)"/>
  <rect width="660" height="400" fill="url(#blue)"/>
  <rect width="660" height="400" fill="url(#lume)"/>

  <!-- faint grounding shadows under the two icon slots -->
  <ellipse cx="175" cy="262" rx="56" ry="11" fill="#1b2740" opacity="0.05" filter="url(#soft)"/>
  <ellipse cx="485" cy="262" rx="56" ry="11" fill="#1b2740" opacity="0.05" filter="url(#soft)"/>

  <!-- helper copy -->
  <text x="330" y="66" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="600" letter-spacing="0.2" fill="#39414f">Drag&#160;<tspan font-weight="800" fill="#fd605e">H</tspan><tspan font-weight="800" fill="#13a7f5">i</tspan> Agent to your Applications folder</text>

  <!-- drag arrow (brand gradient, dotted) -->
  <line x1="258" y1="205" x2="402" y2="205" stroke="url(#arrowgrad)" stroke-width="2.4"
        stroke-linecap="round" stroke-dasharray="0.5 9" marker-end="url(#tip)" opacity="0.9"/>
</svg>
