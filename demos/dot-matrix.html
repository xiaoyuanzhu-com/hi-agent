<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>hi-agent · dot-matrix voice presence</title>
<style>
  :root {
    --bg-0: #04060d; --fg: #d6e4ff; --fg-dim: #8fa0c8; --fg-mute: #5a6b91;
    --line: rgba(120,180,255,0.14); --line-strong: rgba(140,200,255,0.30);
    --mono: "Geist Mono","JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans: "Geist","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(1200px 820px at 50% 38%, #0a1326 0%, var(--bg-0) 66%), var(--bg-0);
    color: var(--fg); font-family: var(--sans); -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; display: block; }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px; padding: 14px 20px;
    background: linear-gradient(180deg, rgba(4,6,13,0.7), rgba(4,6,13,0));
  }
  .title { font-family: var(--mono); font-size: 12px; letter-spacing: 0.26em; text-transform: uppercase; }
  .title b { color: #5af6ff; }
  .spacer { flex: 1; }
  .seg { display: inline-flex; border: 1px solid var(--line-strong); border-radius: 9px; overflow: hidden;
    background: rgba(4,6,13,0.5); backdrop-filter: blur(10px); }
  .seg button { font-family: var(--mono); font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--fg-dim); background: none; border: none; padding: 9px 12px; cursor: pointer; transition: all .16s; }
  .seg button:hover { color: var(--fg); }
  .seg button.on { color: #04060d; background: #5af6ff; }
  label.ctl { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border: 1px solid var(--line-strong);
    border-radius: 9px; background: rgba(4,6,13,0.5); backdrop-filter: blur(10px); }
  label.ctl span { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-mute); }
  input[type=range] { accent-color: #5af6ff; width: 96px; }

  #mic { font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: #04060d; background: linear-gradient(135deg,#5af6ff,#75ffd0); border: none; border-radius: 999px;
    padding: 11px 20px; cursor: pointer; box-shadow: 0 0 22px #5af6ff55; transition: all .2s;
    animation: invite 2.4s ease-in-out infinite; }
  #mic.on { background: linear-gradient(135deg,#ff7aa8,#ffcf8f); box-shadow: 0 0 22px #ff7aa855; animation: none; }
  #mic.err { background: #2a1020; color: #ff7aa8; box-shadow: none; animation: none; }
  @keyframes invite { 0%,100% { box-shadow: 0 0 18px #5af6ff44; } 50% { box-shadow: 0 0 30px #5af6ff88; } }

  footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 14px 20px;
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(0deg, rgba(4,6,13,0.7), rgba(4,6,13,0)); }
  .hint { font-family: var(--mono); font-size: 11px; color: var(--fg-mute); letter-spacing: 0.04em; }
  .meter { width: 140px; height: 6px; border-radius: 999px; background: rgba(120,180,255,0.12); overflow: hidden; }
  .meter > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#5af6ff,#75ffd0);
    box-shadow: 0 0 10px #5af6ff88; }
  .src { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-mute); }
  .src b { color: #5af6ff; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <header>
    <span class="title">hi-agent · <b>dot-matrix</b> presence</span>
    <div class="spacer"></div>
    <div class="seg" id="mode">
      <button data-mode="radial" class="on">radial spectrogram</button>
      <button data-mode="columns">spectrum columns</button>
      <button data-mode="bloom">amplitude bloom</button>
      <button data-mode="wave">waveform</button>
    </div>
    <div class="seg" id="pal">
      <button data-pal="cool" class="on">cool</button>
      <button data-pal="warm">warm</button>
      <button data-pal="mono">mono</button>
    </div>
    <button id="mic">🎤 use mic</button>
  </header>

  <footer>
    <span class="src">source · <b id="src">simulated</b></span>
    <div class="meter"><i id="meter"></i></div>
    <label class="ctl"><span>sensitivity</span><input id="gain" type="range" min="0.4" max="3.5" step="0.05" value="1.5" /></label>
    <label class="ctl"><span>smoothing</span><input id="smooth" type="range" min="0" max="0.92" step="0.02" value="0.74" /></label>
    <span class="hint">click 🎤 and speak — distance/position maps to pitch, brightness to energy</span>
  </footer>

<script>
"use strict";

const PALETTES = {
  cool: { primary: "#5af6ff", secondary: "#9b8cff", soft: "#a8fbff" },
  warm: { primary: "#ffcf8f", secondary: "#ff7aa8", soft: "#ffe6c4" },
  mono: { primary: "#dfe9ff", secondary: "#9fb0d6", soft: "#ffffff" },
};
let palette = PALETTES.cool;
let mode = "radial";
let gain = 1.5;
let smoothing = 0.74;

/* ---- audio / signal ---- */
const NB = 56;                       // display frequency bands
const bands = new Float32Array(NB);
const bandsSmooth = new Float32Array(NB);
const NW = 160;                      // waveform sample columns
const WAVE = new Float32Array(NW);
let level = 0, levelSmooth = 0;

let usingMic = false;
let audioCtx = null, analyser = null, micStream = null;
let freqData = null, timeData = null, sampleRate = 44100, fftSize = 1024;

function updateSignal(t) {
  if (usingMic && analyser) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
    // amplitude (RMS)
    let s = 0;
    for (let i = 0; i < timeData.length; i++) { const v = (timeData[i] - 128) / 128; s += v * v; }
    level = Math.min(1, Math.sqrt(s / timeData.length) * gain * 2.4);
    // log-spaced bands across the speech range
    const minHz = 80, maxHz = 6500, binHz = sampleRate / fftSize;
    for (let b = 0; b < NB; b++) {
      const fLo = minHz * Math.pow(maxHz / minHz, b / NB);
      const fHi = minHz * Math.pow(maxHz / minHz, (b + 1) / NB);
      let lo = Math.max(0, Math.floor(fLo / binHz));
      let hi = Math.min(freqData.length - 1, Math.ceil(fHi / binHz));
      if (hi < lo) hi = lo;
      let m = 0; for (let k = lo; k <= hi; k++) m += freqData[k];
      let v = (m / (hi - lo + 1)) / 255;
      v *= 1 + (b / NB) * 1.4;                       // lift consonant-range highs
      bands[b] = Math.min(1, v * gain);
    }
    for (let i = 0; i < NW; i++) {
      const si = (i / NW * (timeData.length - 1)) | 0;
      WAVE[i] = ((timeData[si] - 128) / 128) * gain;
    }
  } else {
    // gentle simulated speech so the field is alive before the mic is on
    const slow = Math.sin(t * 0.55) + Math.sin(t * 0.24 + 1.1);
    if (slow > 0.2) {
      const w = (Math.sin(t * 10) + Math.sin(t * 16.4) + Math.sin(t * 22.7)) / 3;
      level = 0.3 + Math.abs(w) * 0.6;
    } else level = 0.05 + (Math.sin(t * 1.4) * 0.5 + 0.5) * 0.05;
    for (let b = 0; b < NB; b++) {
      const f = b / NB;
      const env = Math.exp(-f * 1.5);
      const wob = (Math.sin(t * 4 + b * 0.5) * 0.5 + 0.5) * 0.6 + (Math.sin(t * 2.4 + b * 0.21) * 0.5 + 0.5) * 0.4;
      bands[b] = Math.max(0, Math.min(1, level * env * (0.4 + wob)));
    }
    for (let i = 0; i < NW; i++) {
      const fx = i / NW;
      WAVE[i] = Math.sin(fx * Math.PI * 7 - t * 6) * Math.sin(fx * Math.PI) * level;
    }
  }
  const sm = smoothing;
  for (let b = 0; b < NB; b++) bandsSmooth[b] = bandsSmooth[b] * sm + bands[b] * (1 - sm);
  levelSmooth = levelSmooth * sm + level * (1 - sm);
}

/* ---- canvas grid ---- */
const cv = document.getElementById("stage");
const ctx = cv.getContext("2d");
const DPR = Math.min(2, window.devicePixelRatio || 1);
let W = 0, H = 0;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  cv.style.width = W + "px"; cv.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize); resize();

function dot(x, y, b, pal) {
  if (b <= 0.02) {
    ctx.globalAlpha = 0.06; ctx.fillStyle = pal.secondary; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(x, y, 1, 0, 6.2832); ctx.fill(); return;
  }
  const rad = 1 + b * 4.6;
  ctx.globalAlpha = 0.12 + b * 0.88;
  ctx.fillStyle = b > 0.62 ? pal.soft : pal.primary;
  ctx.shadowColor = pal.primary; ctx.shadowBlur = b * 11;
  ctx.beginPath(); ctx.arc(x, y, rad, 0, 6.2832); ctx.fill();
}

function frame(now) {
  const t = now / 1000;
  updateSignal(t);
  document.getElementById("meter").style.width = (Math.min(1, levelSmooth) * 100).toFixed(0) + "%";

  ctx.clearRect(0, 0, W, H);
  const step = 30;
  const cols = Math.floor(W / step), rows = Math.floor(H / step);
  const ox = (W - (cols - 1) * step) / 2, oy = (H - (rows - 1) * step) / 2;
  const cx = W / 2, cy = H / 2;
  const md = Math.min(W, H) * 0.52;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = ox + c * step, y = oy + r * step;
      let b = 0;

      if (mode === "radial") {
        const d = Math.min(1, Math.hypot(x - cx, y - cy) / md);
        const bi = Math.min(NB - 1, (d * NB) | 0);
        const idle = (Math.sin(d * 7 - t * 1.5) * 0.5 + 0.5) * 0.05;
        b = Math.max(idle, bandsSmooth[bi] * (0.5 + levelSmooth * 0.7));

      } else if (mode === "columns") {
        const fx = (x - ox) / ((cols - 1) * step);
        const bi = Math.min(NB - 1, Math.max(0, (fx * NB) | 0));
        const e = bandsSmooth[bi];
        const vy = Math.abs(y - cy) / (H / 2);          // 0 center → 1 edge
        const idle = Math.max(0, 0.05 - vy * 0.05);
        b = Math.max(idle, Math.min(1, (e - vy) + 0.06) * (0.6 + levelSmooth * 0.6));

      } else if (mode === "bloom") {
        const d = Math.min(1.2, Math.hypot(x - cx, y - cy) / md);
        const ripple = Math.sin(d * 6 - t * 4) * 0.5 + 0.5;
        const core = Math.max(0, 1 - d * 1.1) * levelSmooth;
        b = Math.max(core, ripple * (0.12 + levelSmooth * 1.15) * (1 - d * 0.5));

      } else { // wave
        const fx = (x - ox) / ((cols - 1) * step);
        const wi = Math.min(NW - 1, Math.max(0, (fx * NW) | 0));
        const targetY = cy + WAVE[wi] * (H * 0.40);
        const dist = Math.abs(y - targetY);
        b = Math.max(0, 1 - dist / (step * 1.7)) * (0.4 + levelSmooth * 0.8);
        b += (Math.sin(fx * Math.PI) * 0.04);            // faint baseline glow
      }

      dot(x, y, Math.min(1, b), palette);
    }
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---- controls ---- */
document.querySelectorAll("#mode button").forEach((bn) => bn.addEventListener("click", () => {
  mode = bn.dataset.mode;
  document.querySelectorAll("#mode button").forEach((x) => x.classList.toggle("on", x === bn));
}));
document.querySelectorAll("#pal button").forEach((bn) => bn.addEventListener("click", () => {
  palette = PALETTES[bn.dataset.pal];
  document.querySelectorAll("#pal button").forEach((x) => x.classList.toggle("on", x === bn));
}));
document.getElementById("gain").addEventListener("input", (e) => { gain = parseFloat(e.target.value); });
document.getElementById("smooth").addEventListener("input", (e) => { smoothing = parseFloat(e.target.value); });

const micBtn = document.getElementById("mic");
const srcEl = document.getElementById("src");
micBtn.addEventListener("click", async () => {
  if (usingMic) {
    usingMic = false; micBtn.classList.remove("on"); micBtn.textContent = "🎤 use mic";
    srcEl.textContent = "simulated";
    if (micStream) micStream.getTracks().forEach((t) => t.stop());
    if (audioCtx) audioCtx.close();
    audioCtx = null; analyser = null; micStream = null;
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: false } });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") await audioCtx.resume();
    sampleRate = audioCtx.sampleRate;
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = fftSize; analyser.smoothingTimeConstant = 0.55;
    src.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
    usingMic = true; micBtn.classList.add("on"); micBtn.classList.remove("err");
    micBtn.textContent = "🎤 mic live"; srcEl.textContent = "your voice";
  } catch (err) {
    console.warn("mic error", err);
    micBtn.classList.add("err"); micBtn.textContent = "🎤 mic blocked";
    setTimeout(() => { micBtn.classList.remove("err"); micBtn.textContent = "🎤 use mic"; }, 2200);
  }
});
</script>
</body>
</html>
