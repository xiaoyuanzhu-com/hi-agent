# Pinned runtime versions, read at build time by build.rs and stamped into the
# binary as the HI_AGENT_* env vars (surfaced by `--version`). The Node download
# URL is derived from node_version in src/runtime/mod.rs; the adapter/claude tree
# is pinned by the committed package.json + package-lock.json alongside this file.
#
# The managed install lives at a fixed path (not version-keyed), so bumping a pin
# does not auto-reinstall — delete the runtime dir to force a fresh install.
node_version    = "22.14.0"
adapter_version = "0.58.1"
# claude_version is resolved by `npm ci` from the lockfile; recorded here for
# the `--version` stamp only.
claude_version  = "unknown"
