# Pinned runtime versions. Bump bundle_version whenever any pin changes — it
# keys the per-version install cache dir (see src/runtime/mod.rs).
#
# These four values are read at build time by build.rs and stamped into the
# binary as the HI_AGENT_* env vars. The Node download URL is derived from
# node_version in src/runtime/mod.rs; the adapter/claude tree is pinned by the
# committed package.json + package-lock.json alongside this file.
bundle_version  = "1"
node_version    = "22.14.0"
adapter_version = "0.36.1"
# claude_version is resolved by `npm ci` from the lockfile; recorded here for
# the `--version` stamp only.
claude_version  = "unknown"
